<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="referrer" content="no-referrer" />
    <link rel="icon" type="image/png" href="/favicon.png?v=5">
    <link rel="apple-touch-icon" href="/favicon.png?v=5" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Static <title> and description intentionally blank so Facebook (which
         doesn't execute JS) shows no link preview when the domain is shared in
         comments. Google executes JS and picks up per-page titles set by the
         <SEO> component at runtime, so search results are unaffected. -->
    <title></title>
    <meta name="description" content="" />
    <meta name="robots" content="index, follow" />

    <!-- Intentionally suppress social media previews on Facebook, Twitter, LinkedIn, etc.
         Empty og/twitter tags prevent crawlers from surfacing a title, description, or image. -->
    <meta property="og:title" content="" />
    <meta property="og:description" content="" />
    <meta property="og:image" content="" />
    <meta property="og:url" content="" />
    <meta name="twitter:card" content="none" />
    <meta name="twitter:title" content="" />
    <meta name="twitter:description" content="" />
    <meta name="twitter:image" content="" />
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
